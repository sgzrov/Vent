app = "vent-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  RUNNER_LISTEN_PORT = "8443"

# Expose HTTP port for inbound SIP callbacks (Twilio/Bland webhooks)
[http_service]
  internal_port = 8443
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true

[[vm]]
  memory = "2048mb"
  cpu_kind = "performance"
  cpus = 1
