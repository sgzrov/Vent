app = "vent-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  RUNNER_LISTEN_PORT = "8443"
  RUNNER_PUBLIC_HOST = "vent-worker.fly.dev"

# Expose HTTP port for inbound Bland webhook callbacks
[http_service]
  internal_port = 8443
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true

[[vm]]
  memory = "2048mb"
  cpu_kind = "performance"
  cpus = 1
