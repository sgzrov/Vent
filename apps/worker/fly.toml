app = "vent-worker"
primary_region = "iad"
# Wait up to 5m (Fly's hard cap) for in-flight voice calls to drain on deploy.
# Calls longer than 5m will still be SIGKILLed mid-call; combined with
# maxStalledCount: 0 in queue-runtime.ts the run fails cleanly rather than
# being replayed and double-billed.
kill_timeout = "5m"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  WORKER_TOTAL_CONCURRENCY = "45"
  RUNNER_LISTEN_PORT = "8443"
  RUNNER_PUBLIC_HOST = "vent-worker.fly.dev"
  WORKER_METRICS_PORT = "9091"

# Expose HTTP port for inbound Bland webhook callbacks
[http_service]
  internal_port = 8443
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[metrics]
  port = 9091
  path = "/metrics"

[[vm]]
  memory = "4096mb"
  cpu_kind = "performance"
  cpus = 1
