app = "vent-dashboard"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[build.args]
  NEXT_PUBLIC_WORKOS_REDIRECT_URI = "https://venthq.dev/auth/callback"
  NEXT_PUBLIC_API_URL = "https://api.venthq.dev"

[env]
  NODE_ENV = "production"
  INTERNAL_API_URL = "http://vent-api.internal:3000"
  NEXT_PUBLIC_WORKOS_REDIRECT_URI = "https://venthq.dev/auth/callback"
  NEXT_PUBLIC_API_URL = "https://api.venthq.dev"

# Secrets that must be set via `fly secrets set` BEFORE deploy:
#   RUNNER_CALLBACK_SECRET — required for /recordings/[token] routes; same value as the API/worker.
#                            Without this, every recording link returns HTTP 500.
#   WORKOS_API_KEY, WORKOS_CLIENT_ID, WORKOS_COOKIE_PASSWORD — WorkOS authkit-nextjs.

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
