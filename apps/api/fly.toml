app = "vent-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "pnpm --filter @vent/db migrate"
  release_command_timeout = "10m"

[env]
  API_PORT = "3000"
  API_HOST = "0.0.0.0"
  NODE_ENV = "production"
  FLEET_MAX_ACTIVE_RUNS = "45"
  DASHBOARD_URL = "https://venthq.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 2

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
